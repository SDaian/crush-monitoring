name: UI checks

on:
  schedule:
    # Hourly.
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ui:
    name: UI journeys (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, stg, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI checks
        env:
          TARGET_ENV: ${{ matrix.env }}
          # Credentials for the opt-in authenticated login journey, routed per
          # environment. The test skips automatically where these are empty, so
          # only environments with secrets configured run it. dev + stg are
          # wired now; add `prod` here once its credentials exist.
          TEST_USER_USERNAME: >-
            ${{ (matrix.env == 'dev' && secrets.TEST_USER_USERNAME_DEV)
             || (matrix.env == 'stg' && secrets.TEST_USER_USERNAME_STG)
             || '' }}
          TEST_USER_PASSWORD: >-
            ${{ (matrix.env == 'dev' && secrets.TEST_USER_PASSWORD_DEV)
             || (matrix.env == 'stg' && secrets.TEST_USER_PASSWORD_STG)
             || '' }}
        run: npm run test:ui

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.env }}
          path: reports/html
          retention-days: 7

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack alert."
            exit 0
          fi
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: *UI checks failed* on env \`${{ matrix.env }}\`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}" \
            "$SLACK_WEBHOOK_URL"
