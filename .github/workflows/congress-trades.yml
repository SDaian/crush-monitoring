name: Congress trades refresh

on:
  schedule:
    - cron: "17 9 * * *" # daily, off the :00 stampede
  workflow_dispatch:
    inputs:
      limit:
        description: "Max new filings per chamber this run (empty = no cap)"
        required: false
        default: ""
  # TEMPORARY while the feature branch is being live-tested: every push
  # exercises the real government endpoints with a small cap. Remove this
  # trigger (and the branch condition below) before merging to main.
  push:
    branches:
      - claude/politician-stock-trading-qfo6p1

permissions:
  contents: write

concurrency:
  group: congress-trades
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: congress/requirements.txt

      - name: Install fetcher dependencies
        run: pip install -r congress/requirements.txt

      - name: Offline tests (parsers must be green before touching live sites)
        run: python3 -m unittest discover -s tests/congress -p 'test_*.py'

      - name: Fetch new filings
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            EXTRA="--limit 25 --debug-dump debug-dump"
          elif [ -n "${{ github.event.inputs.limit }}" ]; then
            EXTRA="--limit ${{ github.event.inputs.limit }} --debug-dump debug-dump"
          else
            EXTRA="" # full scheduled run: no dump (it would be huge)
          fi
          python3 -m congress fetch $EXTRA 2>&1 | tee fetch.log

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- docs/data/congress-trades.json congress/state.json congress/members.json; then
            echo "No new trades."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/congress-trades.json congress/state.json congress/members.json
          git commit -m "congress: trades refresh ($(date -u +%F))"
          git push

      - name: Upload fetch log and raw payloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: congress-fetch-debug
          path: |
            fetch.log
            debug-dump/
          if-no-files-found: ignore
          retention-days: 7
