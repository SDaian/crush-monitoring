name: Congress trades refresh

on:
  schedule:
    - cron: "17 9 * * *" # daily, off the :00 stampede
  workflow_dispatch:
    inputs:
      limit:
        description: "Max new filings per chamber this run (empty = no cap)"
        required: false
        default: ""
permissions:
  contents: write

concurrency:
  group: congress-trades
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: congress/requirements.txt

      - name: Install fetcher dependencies
        run: pip install -r congress/requirements.txt

      - name: Offline tests (parsers must be green before touching live sites)
        run: python3 -m unittest discover -s tests/congress -p 'test_*.py'

      - name: Refresh member roster (non-fatal)
        run: |
          python3 -m congress roster \
            || echo "::warning::roster refresh failed; using committed members.json"

      - name: Fetch new filings
        run: |
          set -o pipefail # tee must not mask the fetcher's exit code
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            EXTRA="--limit ${{ github.event.inputs.limit }} --debug-dump debug-dump"
          else
            EXTRA="" # full scheduled run: no dump (it would be huge)
          fi
          python3 -m congress fetch $EXTRA 2>&1 | tee fetch.log

      - name: Estimate return-since-buy (non-fatal)
        env:
          # Accept the key whether it was added as an Actions *secret* (preferred)
          # or an Actions *variable* — both live under the same settings page.
          CONGRESS_PRICES_KEY: ${{ secrets.CONGRESS_PRICES_KEY || vars.CONGRESS_PRICES_KEY }}
        run: |
          # Prices move daily even when no new filing arrives, so this runs
          # every day. A price-source outage must not fail the whole refresh.
          python3 -m congress prices --limit 6 2>&1 | tee -a fetch.log \
            || echo "::warning::price refresh failed; keeping prior returns.json"

      - name: Commit refreshed data
        run: |
          FILES="docs/data/congress-trades.json congress/state.json congress/members.json docs/data/returns.json"
          if git diff --quiet -- $FILES; then
            echo "No new trades or price changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $FILES
          git commit -m "congress: trades + returns refresh ($(date -u +%F))"
          # The branch may have moved while the fetch ran; rebase our data
          # commit on top rather than failing the push.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      - name: Upload fetch log and raw payloads
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: congress-fetch-debug
          path: |
            fetch.log
            debug-dump/
          if-no-files-found: ignore
          retention-days: 7
