name: Ticket watch

# Logged-out, read-only availability check for a single FIFA World Cup 2026
# ticketing page. Renders the page in headless Chromium and notifies (Telegram
# and/or a generic webhook) only when the page content CHANGES. It never logs
# in, adds to cart, or attempts a purchase.
#
# NOTE: scheduled runs only fire from the repository's DEFAULT branch, so this
# watcher starts polling once the branch is merged to `main`. Until then, use
# the "Run workflow" button (workflow_dispatch) to trigger it manually.

on:
  schedule:
    # Every 15 minutes (GitHub's scheduler is best-effort and may delay/skip).
    - cron: '*/15 * * * *'
  workflow_dispatch:
  # TEMPORARY: exercise the job on the PR before merge. Removed before merging.
  pull_request:
    paths:
      - '.github/workflows/ticket-watch.yml'
      - 'scripts/ticket-watch.js'

# Never run two checks at once; let an in-flight check finish.
concurrency:
  group: ticket-watch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  watch:
    name: Check ticket availability
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Restore the last-seen content signature from a previous run so we only
      # notify on a real change. The exact key (run_id) never hits; the
      # restore-keys prefix pulls the most recent prior state (rolling cache).
      - name: Restore previous watcher state
        uses: actions/cache/restore@v4
        with:
          path: .ticket-watch-state.json
          key: ticket-watch-state-${{ github.run_id }}
          restore-keys: |
            ticket-watch-state-

      - name: Check availability
        env:
          # Optional repo variable to override the page; falls back to the
          # script's built-in FWC26 default when unset/empty.
          TICKET_URL: ${{ vars.TICKET_URL }}
          TICKET_WATCH_SELECTOR: ${{ vars.TICKET_WATCH_SELECTOR }}
          # Optional notifiers; the script prints to the log regardless.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKET_WATCH_WEBHOOK: ${{ secrets.TICKET_WATCH_WEBHOOK }}
        run: npm run watch:tickets

      # Persist the updated signature under a fresh, unique key so the next run
      # can restore it. `always()` so state is saved even if the check exits
      # non-zero (e.g. a transient navigation error).
      - name: Save watcher state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ticket-watch-state.json
          key: ticket-watch-state-${{ github.run_id }}
